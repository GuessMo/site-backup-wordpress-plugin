name: Version Bump

on:
  push:
    branches: [main]
    paths:
      - '**.php'
      - '**.js'
      - '**.css'

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    if: "!startsWith(github.event.head_commit.message, 'chore(release):')"
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Determine bump type
        id: bump
        run: |
          MSG="${{ github.event.head_commit.message }}"
          echo "Commit message: $MSG"
          if echo "$MSG" | grep -qE '^feat(\(.+\))?:'; then
            echo "type=minor" >> $GITHUB_OUTPUT
            echo "Detected feat - will bump minor"
          elif echo "$MSG" | grep -qE '^fix(\(.+\))?:'; then
            echo "type=patch" >> $GITHUB_OUTPUT
            echo "Detected fix - will bump patch"
          else
            echo "type=none" >> $GITHUB_OUTPUT
            echo "No bump needed"
          fi

      - name: Bump version
        if: steps.bump.outputs.type != 'none'
        run: |
          echo "Bumping version..."
          
          FILE="site-backup.php"
          CURRENT=$(grep -oP '(?<= \* Version: )[\d.]+' "$FILE" 2>/dev/null)
          if [ -z "$CURRENT" ]; then
            echo "No version found in $FILE"
            exit 0
          fi
          echo "Current version: $CURRENT"
          
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          if [ "${{ steps.bump.outputs.type }}" = "minor" ]; then
            MINOR=$((MINOR + 1)); PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi
          NEW="$MAJOR.$MINOR.$PATCH"
          
          sed -i "s/ \* Version: $CURRENT/ \* Version: $NEW/" "$FILE"
          sed -i "s/define( 'POST_MIGRATOR_VERSION', '$CURRENT' )/define( 'POST_MIGRATOR_VERSION', '$NEW' )/" "$FILE"
          
          echo "Updated to $NEW"
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --stat
          git commit -m "chore(release): bump version to $NEW"
          git tag "v$NEW"
          git push origin main --tags